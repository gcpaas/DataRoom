installed:
- agent-context
- staff-review
settings:
  auto_execute_hooks: true
hooks:
  after_specify:
  - extension: agent-context
    command: speckit.agent-context.update
    enabled: true
    optional: true
    priority: 10
    prompt: Execute speckit.agent-context.update?
    description: Refresh agent context after specification
    condition: null
  after_plan:
  - extension: agent-context
    command: speckit.agent-context.update
    enabled: true
    optional: true
    priority: 10
    prompt: Execute speckit.agent-context.update?
    description: Refresh agent context after planning
    condition: null
  after_implement:
  - extension: staff-review
    command: speckit.staff-review.run
    enabled: true
    optional: true
    priority: 10
    prompt: Run staff-level code review?
    description: Reviews implementation changes against spec for correctness, security,
      and quality
    condition: null
